<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>DateHeart Impressum</title>
    <style>
      body { margin: 0; font: 16px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #271018; background: #fff7f9; }
      main { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
      h1, h2 { line-height: 1.15; }
      section { margin-top: 28px; }
      .notice { padding: 14px 16px; border: 1px solid #e6b7c1; border-radius: 8px; background: #fff; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>Impressum</h1>
      <p class="notice">Vor dem öffentlichen Launch echte Betreiberangaben einsetzen.</p>

      <section>
        <h2>Angaben gemäß § 5 TMG</h2>
        <p>[Name/Firma]<br />[Straße und Hausnummer]<br />[PLZ und Ort]<br />[Land]</p>
      </section>

      <section>
        <h2>Kontakt</h2>
        <p>E-Mail: <a href="mailto:support@dateheart.app?subject=DateHeart%20Support">support@dateheart.app</a><br />Support: <a href="./support.html">DateHeart Support</a></p>
      </section>

      <section>
        <h2>Verantwortlich</h2>
        <p>[Name der verantwortlichen Person einsetzen]</p>
      </section>
    </main>
  </body>
</html>
