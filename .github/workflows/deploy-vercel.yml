name: Deploy Vercel

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_AUTOMATIC_TAX: ${{ vars.STRIPE_AUTOMATIC_TAX || 'false' }}
      PAYMENT_ALLOWED_ORIGINS: ${{ vars.PAYMENT_ALLOWED_ORIGINS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Local checks
        run: npm run launch:check

      - name: Pull Vercel environment
        run: npx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build on Vercel settings
        run: npx vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt production
        run: npx vercel@latest deploy --prebuilt --prod --token "$VERCEL_TOKEN"
