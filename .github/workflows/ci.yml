name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Launch checks
        run: npm run launch:check

      - name: API smoke
        run: |
          set -euo pipefail
          PORT=4180 node server/node-server.mjs &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 2
          APP_URL=http://127.0.0.1:4180/ npm run api:smoke
